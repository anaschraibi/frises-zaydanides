  try{
    const title=decodeURIComponent(wiki.split('/wiki/')[1]);

        [{s:1480,e:1516,c:'#8a5808',lbl:`فرديناند وإيزابيلا`,sub:'الملوك الكاثوليك',name:`فرديناند وإيزابيلا — الملوك الكاثوليك`,per:'ح. 1479/1474 – 1516',dyn:'تاج إسبانيا',wiki:'https://ar.wikipedia.org/wiki/%D8%A7%D9%84%D9%85%D9%84%D9%88%D9%83_%D8%A7%D9%84%D9%83%D8%A7%D8%AB%D9%88%D9%84%D9%8A%D9%83_%D9%84%D8%A5%D8%B3%D8%A8%D8%A7%D9%86%D9%8A%D8%A7',desc:`وحّدا إسبانيا، موّلا كولومبوس (1492)، استردا غرناطة، وأقاما محاكم التفتيش. احتلا موانئ مغربية: مليلة (1497)، وهران (1509).`},
          {s:1516,e:1557,c:'#c87810',lbl:`شارل الخامس`,sub:'الإمبراطور',name:`شارل الخامس`,per:'ح. 1516 – 1556',dyn:'آل هابسبورغ',wiki:'https://ar.wikipedia.org/wiki/%D8%B4%D8%A7%D8%B1%D9%84_%D8%A7%D9%84%D8%AE%D8%A7%D9%85%D8%B3',desc:`سيد أوروبا والأمريكتين. هزم فرنسوا الأول في معركة بافيا (1525). فشل في الاستيلاء على الجزائر (1541). تنازل لصالح ابنه فيليبي الثاني عام 1556.`}],
        [{s:1481,e:1495,c:'#5a3808',lbl:`جواو الثاني`,sub:'البرتغال',name:`جواو الثاني ملك البرتغال`,per:'ح. 1481 – 1495',dyn:'آل أفيز (البرتغال)',wiki:'https://ar.wikipedia.org/wiki/%D8%AC%D9%88%D8%A7%D9%88_%D8%A7%D9%84%D8%AB%D8%A7%D9%86%D9%8A',desc:`«الكامل». دعم الاستكشافات الأفريقية وتفاوض على معاهدة توردسيلاس (1494).`},
          {s:1495,e:1521,c:'#7a4c10',lbl:`مانويل الأول`,sub:'البرتغال',name:`مانويل الأول ملك البرتغال`,per:'ح. 1495 – 1521',dyn:'آل أفيز (البرتغال)',wiki:'https://ar.wikipedia.org/wiki/%D9%85%D8%A7%D9%86%D9%88%D9%8A%D9%84_%D8%A7%D9%84%D8%A3%D9%88%D9%84',desc:`ذروة الإمبراطورية البرتغالية. فاسكو دا غاما (1498). احتلال أكادير (1505)، أسفي (1508)، أزمور (1513).`},
          {s:1521,e:1557,c:'#5a3808',lbl:`جواو الثالث`,sub:'البرتغال',name:`جواو الثالث ملك البرتغال`,per:'ح. 1521 – 1557',dyn:'آل أفيز (البرتغال)',wiki:'https://ar.wikipedia.org/wiki/%D8%AC%D9%88%D8%A7%D9%88_%D8%A7%D9%84%D8%AB%D8%A7%D9%84%D8%AB',desc:`خسر أكادير (1541)، ثم أسفي وأزمور وأصيلا (1549). ركّز موارده على البرازيل.`}]
    ],
    events:[{y:1492,lbl:`غرناطة`,name:`سقوط غرناطة واكتشاف الأمريكتين`,per:'1492',wiki:'https://ar.wikipedia.org/wiki/1492',desc:`عام محوري: سقوط غرناطة (نهاية الاسترداد الإسباني)، اكتشاف أمريكا، طرد يهود إسبانيا. ميلاد عالم جديد ستعاني المغرب من تداعياته.`},
      {y:1525,lbl:`بافيا`,name:`معركة بافيا`,per:'1525',wiki:'https://ar.wikipedia.org/wiki/%D9%85%D8%B9%D8%B1%D9%83%D8%A9_%D8%A8%D8%A7%D9%81%D9%8A%D8%A7',desc:`سحق شارل الخامس فرنسوا الأول وأسره. دفع هذا الهزيمة ملك فرنسا نحو التحالف مع العثمانيين.`},
      {y:1541,lbl:`الجزائر`,name:`فشل شارل الخامس أمام الجزائر`,per:'1541',wiki:'https://ar.wikipedia.org/wiki/%D8%AD%D9%85%D9%84%D8%A9_%D8%A7%D9%84%D8%AC%D8%B2%D8%A7%D8%A6%D8%B1_(1541)',desc:`انتهت الحملة الكبرى بكارثة. نهاية الطموحات الإسبانية في شمال أفريقيا.`}]
  },{
    id:'p3',label:'فرنسا\nإنجلترا',
    rows:[
        [{s:1480,e:1498,c:'#183888',lbl:`لويس الحادي عشر — كارلوس الثامن`,sub:'فالوا',name:`لويس الحادي عشر ثم شارل الثامن`,per:'ح. 1461–1498',dyn:'آل فالوا (فرنسا)',wiki:'https://ar.wikipedia.org/wiki/%D9%84%D9%88%D9%8A%D8%B3_%D8%A7%D9%84%D8%AD%D8%A7%D8%AF%D9%8A_%D8%B9%D8%B4%D8%B1',desc:`لويس الحادي عشر وطّد الملكية. شارل الثامن أشعل حروب إيطاليا (1494).`},
          {s:1498,e:1515,c:'#183888',lbl:`لويس الثاني عشر`,sub:'أبو الشعب',name:`لويس الثاني عشر`,per:'ح. 1498 – 1515',dyn:'آل فالوا-أورليان',wiki:'https://ar.wikipedia.org/wiki/%D9%84%D9%88%D9%8A%D8%B3_%D8%A7%D9%84%D8%AB%D8%A7%D9%86%D9%8A_%D8%B9%D8%B4%D8%B1',desc:`«أبو الشعب». واصل حروب إيطاليا.`},
          {s:1515,e:1547,c:'#2248b0',lbl:`فرنسوا الأول`,sub:'ملك النهضة',name:`فرنسوا الأول ملك فرنسا`,per:'ح. 1515 – 1547',dyn:'آل فالوا-أنغوليم',wiki:'https://ar.wikipedia.org/wiki/%D9%81%D8%B1%D8%A7%D9%86%D8%B3%D9%88%D8%A7_%D8%A7%D9%84%D8%A3%D9%88%D9%84',desc:`ملك النهضة الفرنسية. راعي ليوناردو دا فينشي في أمبواز. هُزم في بافيا (1525). أبرم التحالف الفرنسي-العثماني مع سليمان (1536) — أول تحالف رسمي بين دولة مسيحية ودولة إسلامية.`},
          {s:1547,e:1557,c:'#183888',lbl:`هنري الثاني`,sub:'فالوا',name:`هنري الثاني ملك فرنسا`,per:'ح. 1547 – 1559',dyn:'آل فالوا-أنغوليم',wiki:'https://ar.wikipedia.org/wiki/%D9%87%D9%86%D8%B1%D9%8A_%D8%A7%D9%84%D8%AB%D8%A7%D9%86%D9%8A',desc:`واصل سياسة أبيه المناهضة للهابسبورغ. زوج كاترين دي مديتشي. توفي في حادث مبارزة بالرمح (1559).`}],
        [{s:1485,e:1509,c:'#282078',lbl:`هنري السابع`,sub:'إنجلترا',name:`هنري السابع ملك إنجلترا`,per:'ح. 1485 – 1509',dyn:'آل تيودور (إنجلترا)',wiki:'https://ar.wikipedia.org/wiki/%D9%87%D9%86%D8%B1%D9%8A_%D8%A7%D9%84%D8%B3%D8%A7%D8%A8%D8%B9',desc:`مؤسس سلالة تيودور. أنهى حرب الوردتين.`},
          {s:1509,e:1547,c:'#382898',lbl:`هنري الثامن`,sub:'إنجلترا',name:`هنري الثامن ملك إنجلترا`,per:'ح. 1509 – 1547',dyn:'آل تيودور (إنجلترا)',wiki:'https://ar.wikipedia.org/wiki/%D9%87%D9%86%D8%B1%D9%8A_%D8%A7%D9%84%D8%AB%D8%A7%D9%85%D9%86',desc:`أسس الكنيسة الإنجليكانية. ست زوجات، اثنتان أُعدمتا. لقاء الديباج الذهبي مع فرنسوا الأول (1520). الانفصال عن روما (1534).`},
          {s:1547,e:1557,c:'#282078',lbl:`إدوارد السادس — ماري الأولى`,sub:'تيودور',name:`إدوارد السادس ثم ماري الأولى`,per:'ح. 1547 – 1558',dyn:'آل تيودور',wiki:'https://ar.wikipedia.org/wiki/%D9%85%D8%A7%D8%B1%D9%8A_%D8%A7%D9%84%D8%A3%D9%88%D9%84%D9%89',desc:`إدوارد السادس مات في الخامسة عشرة. ماري الأولى «الدموية» حاولت استعادة الكاثوليكية.`}]
    ],
    events:[{y:1520,lbl:`قماش الذهب`,name:`لقاء حقل القماش الذهبي`,per:'1520',wiki:'https://ar.wikipedia.org/wiki/%D8%AD%D9%82%D9%84_%D8%A7%D9%84%D9%82%D9%85%D8%A7%D8%B4_%D8%A7%D9%84%D8%B0%D9%87%D8%A8%D9%8A',desc:`لقاء دبلوماسي مبهر بين فرنسوا الأول وهنري الثامن قرب كاليه. أسبوعان من المهرجانات والبطولات الفروسية.`},
      {y:1536,lbl:`التحالف ف-ع`,name:`التحالف الفرنسي-العثماني`,per:'1536',wiki:'https://ar.wikipedia.org/wiki/%D8%A7%D9%84%D8%AA%D8%AD%D8%A7%D9%84%D9%81_%D8%A7%D9%84%D9%81%D8%B1%D9%86%D8%B3%D9%8A_%D8%A7%D9%84%D8%B9%D8%AB%D9%85%D8%A7%D9%86%D9%8A',desc:`تحالف فرنسوا الأول وسليمان القانوني ضد شارل الخامس. أول تحالف رسمي بين دولة مسيحية ودولة إسلامية — فضيحة في عموم أوروبا المسيحية.`}]
  },{
    id:'p4',label:'شخصيات\nمحورية',
    rows:[
        [{s:1494,e:1554,c:'#5a208a',lbl:`ليون الأفريقي`,sub:'الحسن الوزان',name:`الحسن الوزان (ليون الأفريقي)`,per:'ح. 1494 – ح. 1554',dyn:'جغرافي ودبلوماسي وإنساني',wiki:'https://ar.wikipedia.org/wiki/%D8%A7%D9%84%D8%AD%D8%B3%D9%86_%D8%A7%D9%84%D9%88%D8%B2%D8%A7%D9%86',desc:`وُلد في غرناطة ونشأ في فاس. أُسر على يد قراصنة (1520) وأُهدي إلى البابا ليون العاشر. ألّف وصف أفريقيا (1526). شخصية محورية في رواية أنس الشرايبي.`},
          {s:1519,e:1557,c:'#8840a8',lbl:`حُرّم سلطان`,sub:'روكسيلانا',name:`حُرّم سلطان (روكسيلانا)`,per:'ح. 1505 – 1558',dyn:'زوجة شرعية لسليمان الأول',wiki:'https://ar.wikipedia.org/wiki/%D8%AD%D8%B1%D9%85_%D8%B3%D9%84%D8%B7%D8%A7%D9%86',desc:`جارية أوكرانية الأصل أصبحت الزوجة الشرعية لسليمان — الأولى في التاريخ العثماني. سياسية بارعة وراعية كبرى للعمارة. شخصية محورية في أبحاث المؤرخة جوسلين داخليا حول حريم السلاطين.`}],
        [{s:1480,e:1518,c:'#8a5808',lbl:`يحيى بن تافوفوت`,sub:'†1518',name:`يحيى بن تافوفوت`,per:'ح. 1480 – 1518',dyn:'حاكم وطاسي على سلا-الرباط',wiki:'',desc:`آخر حاكم وطاسي لمنطقة سلا والرباط. الشخصية التاريخية التي تقع في صميم رواية أنس الشرايبي «Je te donnerai Marrakech». مات عام 1518 ممزقاً بين ولائه للوطاسيين المتراجعين والضغط السعدي من الجنوب والطموحات البرتغالية.`}]
    ],
    events:[]
  }];
const LEGEND_DATA=[{c:'#1555a0',lbl:'الوطاسيون'},{c:'#0e7040',lbl:'السعديون'},{c:'#8c0818',lbl:'العثمانيون'},{c:'#b02020',lbl:'الجزائر'},{c:'#8a5808',lbl:'إسبانيا'},{c:'#5a3808',lbl:'البرتغال'},{c:'#183888',lbl:'فرنسا'},{c:'#282078',lbl:'إنجلترا'},{c:'#5a208a',lbl:'شخصيات محورية'}];
function el(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function build(){
  const leg=document.getElementById('legend');
  LEGEND_DATA.forEach(d=>{
    const li=el('div','li');
    li.innerHTML=`<span class="ls" style="background:${d.c}"></span>${d.lbl}`;
    leg.appendChild(li);
  });
  const tli=document.getElementById('tli');
  tli.style.width=(LW+TW+60)+'px';
  tli.appendChild(buildAxis());
  POWERS.forEach((p,pi)=>tli.appendChild(buildRow(p,pi)));
  prefetchAll();
}
function buildAxis(){
  const row=el('div','row ax-row');
  const rl=el('div','rl');
  rl.innerHTML=`<div class="rlt" style="color:var(--gold)">الحقبة</div>`;
  row.appendChild(rl);
  const rc=el('div','rc');
  rc.style.cssText=`width:${TW+60}px;height:44px;background:var(--panel2)`;
  for(let yr=S;yr<=E+1;yr++){
    const ym=el('div','ym '+(yr%10===0?'dec':yr%5===0?'fiv':'sin'));
    ym.style.left=yx(yr)+'px';
    const isDec=yr%10===0,isFiv=yr%5===0;
    ym.innerHTML=`<div class="yt"></div>${(isDec||isFiv)?`<div class="yl">${yr}</div>`:''}`;
    rc.appendChild(ym);
  }
  row.appendChild(rc);
  return row;
}
function buildRow(p,pi){
  const nsr=p.rows.length;
  const hasEvt=p.events.length>0;
  const BG=8,PT=10,PB=10;
  const EH=hasEvt?56:0,EM=hasEvt?10:0;
  const rowH=PT+nsr*(BH+BG)-BG+EM+EH+PB;
  const row=el('div','row');
  const rl=el('div','rl');
  rl.innerHTML=`<div class="rlt">${p.label.replace('\n','<br>')}</div>`;
  row.appendChild(rl);
  const rc=el('div','rc');
  rc.style.cssText=`width:${TW+60}px;height:${rowH}px;background:${pi%2===0?'rgba(255,255,255,.6)':'rgba(240,232,210,.4)'}`;
  for(let yr=S;yr<=E;yr+=10){
    const gl=el('div','gl');
    gl.style.cssText=`left:${yx(yr)}px;height:${rowH}px;background:rgba(0,0,0,.06)`;
    rc.appendChild(gl);
  }
  p.rows.forEach((sr,si)=>{
    const barTop=PT+si*(BH+BG);
    sr.forEach(ruler=>{
      const bw=Math.max(yw(ruler.s,ruler.e)-2,2);
      const bx=yx(ruler.s)+1;
      if(bw<=0)return;
      const bar=el('div','rb');
      bar.style.cssText=`left:${bx}px;top:${barTop}px;width:${bw}px;height:${BH}px;background:${ruler.c}`;
      if(bw>=50){
        const port=el('div','rb-portrait');
        port.dataset.wiki=ruler.wiki||'';
        port.innerHTML=`<div class="rb-portrait-ph"><svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg></div>`;
        bar.appendChild(port);
      }
      if(bw>80){
        const body=el('div','rb-body');
        body.innerHTML=`<div class="rbl">${ruler.lbl}</div>${ruler.sub?`<div class="rbl-sub">${ruler.sub}</div>`:''}`;
        bar.appendChild(body);
      }
      if(ruler.star){const s=el('div','rb-star');s.textContent='★';bar.appendChild(s);}
      bar.title=ruler.name;
      bar.addEventListener('click',()=>openModal(ruler));
      rc.appendChild(bar);
    });
  });
  if(hasEvt){
    const evtTop=PT+nsr*(BH+BG)-BG+EM;
    p.events.forEach(evt=>{
      const ex=yx(evt.y);
      const vl=el('div','evl');
      vl.style.cssText=`left:${ex}px;height:${rowH}px`;
      rc.appendChild(vl);
      const evm=el('div','evm');
      evm.style.cssText=`left:${ex-5}px;top:${evtTop}px;width:44px`;
      if(evt.wiki){
        const ep=el('div','ev-portrait');
        const img=document.createElement('img');
        img.dataset.wiki=evt.wiki;
        ep.appendChild(img);
        evm.appendChild(ep);
      }
      const diamond=el('div','evd');
      evm.appendChild(diamond);
      const etxt=el('div','evtxt');
      etxt.textContent=evt.lbl;
      evm.appendChild(etxt);
      evm.addEventListener('click',()=>openModal({per:evt.per,name:evt.name,dyn:'',c:'var(--gold)',wiki:evt.wiki,desc:evt.desc}));
      rc.appendChild(evm);
    });
  }
  row.appendChild(rc);
  return row;
}
async function prefetchAll(){
  const wikis=new Set();
  POWERS.forEach(p=>{
    p.rows.forEach(sr=>sr.forEach(r=>{if(r.wiki)wikis.add(r.wiki);}));
    p.events.forEach(e=>{if(e.wiki)wikis.add(e.wiki);});
  });
  for(const wiki of wikis){
    fetchWikiImg(wiki).then(src=>{
      if(!src)return;
      document.querySelectorAll(`.rb-portrait[data-wiki="${CSS.escape(wiki)}"]`).forEach(port=>{
        const img=document.createElement('img');
        img.src=src;
        img.style.cssText='width:100%;height:100%;object-fit:cover;object-position:top center;filter:sepia(20%) contrast(1.05);position:absolute;inset:0';
        img.onload=()=>{port.innerHTML='';port.appendChild(img);};
      });
      document.querySelectorAll(`.ev-portrait img[data-wiki="${CSS.escape(wiki)}"]`).forEach(img=>{
        img.src=src;img.onload=()=>{img.style.display='block';};
      });
    });
  }
}
function openModal(d){
  document.getElementById('mper').textContent=d.per||'';
  document.getElementById('mnam').textContent=d.name;
  document.getElementById('mdyn').textContent=d.dyn||'';
  document.getElementById('mcol').style.background=d.c;
  document.getElementById('mdesc').textContent=d.desc;
  const wk=document.getElementById('mwk');
  if(d.wiki){wk.href=d.wiki;wk.style.display='inline-flex';}
  else{wk.style.display='none';}
  const imgBox=document.getElementById('mhead-img');
  const spinner=document.getElementById('mspinner');
  imgBox.querySelectorAll('img').forEach(i=>i.remove());
  spinner.textContent='';
  if(d.wiki){
    spinner.textContent='جارٍ التحميل…';
    fetchWikiImg(d.wiki).then(src=>{
      spinner.textContent='';
      if(src){
        const img=document.createElement('img');
        img.src=src;
        img.style.cssText='width:100%;height:100%;object-fit:cover;object-position:top center;display:none;position:absolute;inset:0';
        img.onload=()=>{img.style.display='block';};
        imgBox.appendChild(img);
      }
    });
  }
  document.getElementById('mbg').classList.add('open');
}
function closeModal(){document.getElementById('mbg').classList.remove('open');}
document.getElementById('mclo').addEventListener('click',closeModal);
document.getElementById('mbg').addEventListener('click',e=>{if(e.target===document.getElementById('mbg'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
(function(){
  const w=document.getElementById('tlw');
  let down=false,sx,sl;
  w.addEventListener('mousedown',e=>{if(e.target.closest('.rb')||e.target.closest('.evm'))return;down=true;sx=e.pageX-w.offsetLeft;sl=w.scrollLeft;w.style.cursor='grabbing';});
  document.addEventListener('mouseup',()=>{down=false;document.getElementById('tlw').style.cursor='default';});
  w.addEventListener('mousemove',e=>{if(!down)return;e.preventDefault();w.scrollLeft=sl-(e.pageX-w.offsetLeft-sx)*1.4;});
})();
build();
</script>
</body>
